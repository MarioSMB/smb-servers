// Special information for this server
// Use this file to start the server

exec configs/auth-smb.cfg
exec configs/common-smb.cfg
exec configs/aliases-insta.cfg
exec configs/server-insta.cfg

hostname "(SMB) USA InstaGib+Hook CTF [ARIZONA]"
sv_motd "Welcome to the Super Mario Bros. clan server"
port 26002
maxplayers 32

// for the discord bot
rcon_restricted_commands "say chat_dest_udp"

sv_termsofservice_url "http://31.220.18.52:8443/data_insta/tos.txt"

set sv_dadjokes 1
set sv_dadjokes_server "https://icanhazdadjoke.com/"

// mariocize the server
g_ctf_flag_red_model "models/ctf/flags_mario.md3"
g_ctf_flag_blue_model "models/ctf/flags_mario.md3"
g_ctf_flag_yellow_model "models/ctf/flags_mario.md3"
g_ctf_flag_pink_model "models/ctf/flags_mario.md3"
g_ctf_flag_neutral_model "models/ctf/flags_mario.md3"
set sv_announcer "mario"
sv_intermission_cdtrack "jingle_mario"

// we use special models here
set sv_newrecord_permodel 1
set g_debug_globalsounds 1
sv_precacheplayermodels 0
sv_defaultcharacter 1
set sv_allow_customplayermodels 2
sv_defaultplayermodel "models/player/erebus.iqm models/player/waluigi.iqm models/player/shantae.iqm models/player/geno.dpm models/player/nabbit.dpm models/player/toad.dpm models/player/peach.iqm models/player/daisy.iqm models/player/wart.dpm models/player/zelda.iqm models/player/banjo.iqm models/player/rosalina.iqm models/player/yoshi.dpm models/player/luigi.dpm models/player/pacman.iqm models/player/krool.dpm models/player/sonic.dpm models/player/egadd.dpm models/player/bowser.dpm models/player/wapeach.iqm models/player/sephiroth.iqm models/player/pauline.iqm models/player/samus.iqm models/player/tinkywinky.dpm models/player/ridley.iqm models/player/link.dpm models/player/charles.iqm models/player/dixie.iqm models/player/diddy.iqm models/player/syrup.iqm models/player/shroob.iqm models/player/ganon.iqm models/player/sandbag.iqm models/player/falcon.iqm models/player/vivian.iqm models/player/peasley.iqm models/player/kirby.iqm models/player/rob.iqm models/player/wario.iqm"
